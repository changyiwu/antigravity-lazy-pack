name: Validate lazy pack

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Validate chapters and skills
        shell: powershell
        run: .\scripts\validate-lazy-pack.ps1
