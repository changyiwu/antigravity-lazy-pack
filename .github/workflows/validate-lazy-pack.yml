name: Validate lazy pack

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate chapters and skills
        shell: powershell
        run: .\scripts\validate-lazy-pack.ps1
